specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: wXTMBridge
    network: sepolia
    source:
      address: "0x4F31d7FC63FdBcfC119F9A0C0549150B00C356e8"
      abi: wXTMBridge
      startBlock: 9010652
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - TokensUnwrapped
        - Counter
        - PushNotification
      abis:
        - name: wXTMBridge
          file: ./abis/wXTMBridge.json
      eventHandlers:
        - event: TokensUnwrapped(address,string,uint256,uint256)
          handler: handleTokensUnwrapped
      file: ./src/w-xtm-bridge.ts
