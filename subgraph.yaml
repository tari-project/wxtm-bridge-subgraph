specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: wXTMBridge
    network: sepolia
    source:
      address: "0x42dbaC20Bf60eC34232e16408d2f745519ff2E56"
      abi: wXTMBridge
      startBlock: 8381746
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - TokensUnwrapped
        - Counter
        - PushNotification
      abis:
        - name: wXTMBridge
          file: ./abis/wXTMBridge.json
      eventHandlers:
        - event: TokensUnwrapped(indexed address,string,indexed uint256)
          handler: handleTokensUnwrapped
      file: ./src/w-xtm-bridge.ts
