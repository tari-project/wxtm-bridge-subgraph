      language: wasm/assemblyscript
      entities:
        - TokensUnwrappedRecord
      abis:
        - name: wXTMBridge
          file: ./abis/wXTMBridge.json
      eventHandlers:
        - event: TokensUnwrapped(address,string,uint256,uint256)
          handler: handleTokensUnwrapped
      file: ./src/w-xtm-bridge.ts
