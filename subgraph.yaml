specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: wXTMBridge
    network: sepolia
    source:
      address: "0x0774838a6Bf49D1125b3426d87D8F831607B1e0A"
      abi: wXTMBridge
      startBlock: 8165061
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - OwnershipTransferred
        - TokensUnwrapped
      abis:
        - name: wXTMBridge
          file: ./abis/wXTMBridge.json
      eventHandlers:
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: TokensUnwrapped(indexed address,string,indexed uint256)
          handler: handleTokensUnwrapped
      file: ./src/w-xtm-bridge.ts
