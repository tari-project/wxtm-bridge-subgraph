specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: wXTMBridge
    network: mainnet
    source:
      address: "0xb72FD42A94a360587dCe790947e18A2CbcD4BC65"
      abi: wXTMBridge
      startBlock: 22539483
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - TokensUnwrapped
        - Counter
        - PushNotification
      abis:
        - name: wXTMBridge
          file: ./abis/wXTMBridge.json
      eventHandlers:
        - event: TokensUnwrapped(indexed address,string,indexed uint256)
          handler: handleTokensUnwrapped
      file: ./src/w-xtm-bridge.ts
