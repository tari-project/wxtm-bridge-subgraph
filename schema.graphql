type TokensUnwrapped @entity(immutable: true) {
  id: Bytes!
  from: Bytes! # address
  targetTariAddress: String! # string
  amount: BigInt! # uint256
  nonce: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type Counter @entity(immutable: false) {
  id: ID!
  value: Int!
}

type PushNotification @entity(immutable: true) {
  id: ID!
  signature: String!
  contract: Bytes!
  timestamp: BigInt!
  blockHash: Bytes!
  blockNumber: BigInt!
  transactionHash: Bytes!
  logIndex: BigInt!
  seqNumber: Int!
  transactionData: Bytes
}
